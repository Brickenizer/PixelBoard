; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env]
monitor_speed = 115200
build_flags = -I include

; ---------------------------------------------------------------------------
; USB upload (first flash, or recovery)
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
    mathieucarbou/AsyncTCP @ ^3.2.0
    kosme/arduinoFFT @ ^2.0.4
board_build.filesystem = spiffs
board_build.partitions = min_spiffs.csv  ; OTA-compatible partition table
build_type = debug
upload_port = COM7        ; <<<< change to your actual COM port

; ---------------------------------------------------------------------------
; OTA upload (after first flash, while device is on WiFi)
; Usage: pio run -e esp32dev_ota -t upload
; ---------------------------------------------------------------------------
[env:esp32dev_ota]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED @ ^3.6.0
    mathieucarbou/ESPAsyncWebServer @ ^3.3.0
    mathieucarbou/AsyncTCP @ ^3.2.0
    kosme/arduinoFFT @ ^2.0.4
board_build.filesystem = spiffs
board_build.partitions = min_spiffs.csv
build_type = debug
upload_protocol = espota
upload_port = pixelboard.local   ; or use the IP address e.g. 192.168.1.42
; upload_flags = --auth=pixelboard  ; uncomment if you set a password
